<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense Tracker Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #e5e7eb;
}

.header {
    background: #020617;
    padding: 15px;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.form {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
}

input, select {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #020617;
    color: white;
}

button {
    width: 100%;
}

.summary {
    display: flex;
    justify-content: space-between;
}

.table-container {
    overflow-x: auto;
}

table {
    width: 100%;
    min-width: 600px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #333;
}

canvas {
    max-height: 300px;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0b1220; /* darker but cleaner */
    color: #f9fafb; /* bright white */
}

.header {
    background: #020617;
    color: #ffffff;
}

.card {
    background: #111827;
    color: #f3f4f6;
}

input, select {
    background: #020617;
    color: #ffffff;
    border: 1px solid #4b5563;
}

input::placeholder {
    color: #9ca3af;
}

th {
    color: #ffffff;
}

td {
    color: #e5e7eb;
}

/* MOBILE */
@media (max-width: 768px) {
    .form { grid-template-columns: 1fr; }
    .summary { flex-direction: column; text-align: center; gap: 10px; }
}
</style>
</head>

<body>

<div class="header">💼 Expense Tracker By Tanishka </div>

<div class="container">

<div class="card">
<div class="form">
<input type="text" id="desc" placeholder="Description">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">

<select id="category">
<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Bills</option>
<option>Grocery</option>
<option>Extra</option>
</select>

<button class="btn btn-primary" onclick="addExpense()">Add / Update Expense</button>
</div>
</div>

<div class="card summary">
<div>Total: ₹ <span id="total">0</span></div>
<div>This Month: ₹ <span id="monthTotal">0</span></div>
</div>

<div class="card table-container">
<table>
<thead>
<tr>
<th>Description</th>
<th>Amount</th>
<th>Category</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="card">
<h5>Category Wise Expense</h5>
<canvas id="pieChart"></canvas>
</div>

<div class="card">
<h5>Monthly Expense</h5>
<canvas id="barChart"></canvas>
</div>

</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let editIndex = -1;

let pieChart, barChart;

// AUTO DATE
function setTodayDate() {
    let today = new Date().toISOString().split('T')[0];
    document.getElementById("date").value = today;
}

// ADD / UPDATE
function addExpense() {
    let desc = document.getElementById("desc").value;
    let amount = document.getElementById("amount").value;
    let date = document.getElementById("date").value;
    let category = document.getElementById("category").value;

    if (!desc || !amount || !date) return alert("Fill all fields");

    if (editIndex === -1) {
        expenses.push({
            desc,
            amount: parseFloat(amount),
            date,
            category,
            createdAt: new Date().getTime()
        });
    } else {
        expenses[editIndex] = {
            ...expenses[editIndex],
            desc,
            amount: parseFloat(amount),
            date,
            category
        };
        editIndex = -1;
    }

    localStorage.setItem("expenses", JSON.stringify(expenses));
    render();
    clearInputs();
}

// RENDER
function render() {
    let tbody = document.getElementById("tableBody");
    let total = 0;
    let monthTotal = 0;
    let currentMonth = new Date().getMonth();

    tbody.innerHTML = "";

    expenses.forEach((exp, index) => {
        total += exp.amount;

        if (new Date(exp.date).getMonth() === currentMonth) {
            monthTotal += exp.amount;
        }

        let row = `
        <tr>
            <td>${exp.desc}</td>
            <td>₹${exp.amount}</td>
            <td>${exp.category}</td>
            <td>${exp.date}</td>
            <td class="d-flex flex-wrap gap-1">
                <button class="btn btn-sm btn-info" onclick="editExpense(${index})">✏️</button>
                <button class="btn btn-sm btn-danger" onclick="deleteExpense(${index})">🗑</button>
            </td>
        </tr>
        `;

        tbody.innerHTML += row;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("monthTotal").innerText = monthTotal;

    renderCharts();
}

// EDIT
function editExpense(index) {
    let exp = expenses[index];

    document.getElementById("desc").value = exp.desc;
    document.getElementById("amount").value = exp.amount;
    document.getElementById("date").value = exp.date;
    document.getElementById("category").value = exp.category;

    editIndex = index;
}

// DELETE
function deleteExpense(index) {
    expenses.splice(index, 1);
    localStorage.setItem("expenses", JSON.stringify(expenses));
    render();
}

// CLEAR
function clearInputs() {
    document.getElementById("desc").value = "";
    document.getElementById("amount").value = "";
    setTodayDate();
}

// CHARTS
function renderCharts() {

    let categoryData = {};
    expenses.forEach(exp => {
        categoryData[exp.category] = (categoryData[exp.category] || 0) + exp.amount;
    });

    if (pieChart) pieChart.destroy();

    pieChart = new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: Object.keys(categoryData),
            datasets: [{
                data: Object.values(categoryData),
                backgroundColor: ['#ef4444','#22c55e','#3b82f6','#f59e0b','#a855f7','#14b8a6']
            }]
        }
    });

    let monthly = Array(12).fill(0);
    expenses.forEach(exp => {
        let m = new Date(exp.date).getMonth();
        monthly[m] += exp.amount;
    });

    if (barChart) barChart.destroy();

    barChart = new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{
                label: "Monthly Expense",
                data: monthly,
                backgroundColor: '#3b82f6'
            }]
        }
    });
}

// INIT
setTodayDate();
render();
</script>

</body>
</html>
